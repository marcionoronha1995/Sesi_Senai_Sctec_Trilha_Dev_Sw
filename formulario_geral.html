<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Geral</title>
</head>
<body>
    <header>
        <h1>Formulário Geral</h1>
        <nav>
            <ul>
                <li><a href="index.html">Voltar ao Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form action="#" method="post">
            <section>
                <h2>Dados Pessoais</h2>
                <div>
                    <label for="nome_completo">Nome Completo:</label>
                    <input type="text" id="nome_completo" name="nome_completo" required>
                </div>
                <div>
                    <label for="e_mail">E-mail:</label>
                    <input type="email" id="e_mail" name="e_mail" required>
                </div>
                <div>
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade">
                </div>
            </section>

            <section>
                <h2>Informações Acadêmicas</h2>
                <div>
                    <label for="materia">Matéria:</label>
                    <select id="materia" name="materia">
                        <option value="matematica">Matemática</option>
                        <option value="portugues">Português</option>
                        <option value="biologia">Biologia</option>
                        <option value="ciencias">Ciências</option>
                        <option value="historia">História</option>
                        <option value="geografia">Geografia</option>
                        <option value="artes">Artes</option>
                    </select>
                </div>
                <div>
                    <label for="escolaridade">Escolaridade:</label>
                    <select id="escolaridade" name="escolaridade">
                        <option value="ensino_superior_completo">Ensino superior completo</option>
                        <option value="cursando_mestrado">Cursando Mestrado</option>
                        <option value="mestrado_completo">Mestrado completo</option>
                        <option value="cursando_doutorado">Cursando doutorado</option>
                        <option value="doutorado_completo">Doutorado completo</option>
                    </select>
                </div>
            </section>

            <section>
                <h2>Descrição</h2>
                <div>
                    <label for="descricao">Descrição:</label><br>
                    <textarea id="descricao" name="descricao" rows="3" cols="80"></textarea>
                </div>
            </section>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 - Márcio Noronha</p>
    </footer>
</body>
</html>
